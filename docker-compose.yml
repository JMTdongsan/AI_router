services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-router-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VLLM_URL: http://vllm:8000/v1
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-seoul_plan}
      QDRANT_VECTOR_NAMES: ${QDRANT_VECTOR_NAMES:-text_dense}
      QDRANT_RETRIEVAL_CONFIG: ${QDRANT_RETRIEVAL_CONFIG:-}
      CHUNKING_DOCS_PACKAGE_DIR: ${CHUNKING_DOCS_PACKAGE_DIR:-}
      BM25_TOKENS_PATH: ${BM25_TOKENS_PATH:-}
      RAG_TOP_K: ${RAG_TOP_K:-5}
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      qdrant:
        condition: service_started
      vllm:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - ai-router

  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: ai-router-vllm
    restart: unless-stopped
    command:
      - --model
      - ${VLLM_MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HF_HOME:-./.cache/huggingface}:/root/.cache/huggingface
    gpus: all
    ipc: host
    shm_size: "16gb"
    networks:
      - ai-router

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: ai-router-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${QDRANT_DATA_PATH:-./.local/qdrant}:/qdrant/storage
    networks:
      - ai-router

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: ai-router-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA_PATH:-./.local/prometheus}:/prometheus
    depends_on:
      - api
      - vllm
      - qdrant
      - cadvisor
      - node-exporter
    networks:
      - ai-router

  grafana:
    image: grafana/grafana:12.1.1
    container_name: ai-router-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${GRAFANA_DATA_PATH:-./.local/grafana}:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ai-router

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: ai-router-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    networks:
      - ai-router

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: ai-router-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    networks:
      - ai-router

networks:
  ai-router:
    driver: bridge
