services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-router-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VLLM_URL: http://vllm:8000/v1
      MILVUS: milvus
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      milvus:
        condition: service_started
      vllm:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - ai-router

  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: ai-router-vllm
    restart: unless-stopped
    command:
      - --model
      - ${VLLM_MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HF_HOME:-./.cache/huggingface}:/root/.cache/huggingface
    gpus: all
    ipc: host
    shm_size: "16gb"
    networks:
      - ai-router

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: ai-router-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >-
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - ${ETCD_DATA_PATH:-./.local/etcd}:/etcd
    networks:
      - ai-router

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: ai-router-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_PATH:-./.local/minio}:/minio_data
    networks:
      - ai-router

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: ai-router-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HTTP_PORT:-9091}:9091"
    volumes:
      - ${MILVUS_DATA_PATH:-./.local/milvus}:/var/lib/milvus
    networks:
      - ai-router

networks:
  ai-router:
    driver: bridge
