global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: ai-router-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:5000"]

  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]

  - job_name: milvus
    metrics_path: /metrics
    static_configs:
      - targets: ["milvus:9091"]

  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["node-exporter:9100"]
